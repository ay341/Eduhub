name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering of the build from GitHub UI

jobs:
  build:
    name: Build Signed APKs
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Create .env file from .env.example
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
          echo "Successfully copied .env.example to .env"
        else
          echo "No .env.example found, creating empty .env"
          touch .env
        fi

    - name: Decode Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
          echo "Successfully decoded debug.keystore from base64"
        else
          echo "Error: debug.keystore.base64 not found in repository root!"
          exit 1
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Signed APKs with Gradle
      run: ./gradlew assembleDebug assembleRelease --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/app-release.apk
