name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering of the build from GitHub UI

jobs:
  build:
    name: Build Signed APKs
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Create .env file from .env.example
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
          echo "Successfully copied .env.example to .env"
        else
          echo "No .env.example found, creating empty .env"
          touch .env
        fi

    - name: Ensure Debug Keystore is present
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Attempting to decode debug.keystore from base64..."
          python3 -c "
import base64, sys
try:
    data = open('debug.keystore.base64', 'rb').read()
    # clean whitespaces and newlines
    data = b''.join(data.split())
    # fix padding
    data += b'=' * ((4 - len(data) % 4) % 4)
    decoded = base64.b64decode(data)
    open('debug.keystore', 'wb').write(decoded)
    print('Successfully decoded debug.keystore from base64!')
except Exception as e:
    print(f'Decoding failed: {e}. A new keystore will be generated instead.')
"
        fi
        
        if [ ! -f debug.keystore ]; then
          echo "debug.keystore not found or decode failed. Generating a new one using keytool..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          echo "Successfully generated fallback debug.keystore!"
        fi

    - name: Clean CRLF Line Endings in gradlew
      run: |
        sed -i -e 's/\r$//' gradlew
        chmod +x gradlew

    - name: Verify Gradle Wrapper
      run: ./gradlew --version

    - name: Build Signed APKs with Gradle
      run: ./gradlew assembleDebug assembleRelease --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/app-release.apk
